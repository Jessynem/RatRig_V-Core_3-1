#------------------------------------------------ HEATER BED ------------------------------------------------
# The heated bed configuration
#------------------------------------------------------------------------------------------------------------
[heater_bed]
#control: pid
#pid_Kp: 22.2
#pid_Ki: 1.08
#pid_Kd: 114
max_power: 0.8

#--------------------------------------- Termal Compensation Package ----------------------------------------
# Gantry Temperature Sensor for Thermal Compensation 
#------------------------------------------------------------------------------------------------------------
[temperature_sensor Gantry_Sensor]
sensor_type: PT1000
sensor_pin: mcu:PA7

#---------------------------------------------- Chamber Light -----------------------------------------------
# Chamber Light connected to HE3 via 24V
#------------------------------------------------------------------------------------------------------------
[output_pin chamber_light]
pin: PA5
pwm: True
shutdown_value: 0 # 1
value: 0.06 # Brightness at startup (0.0-1.0)
cycle_time: 0.001 # 0.003
hardware_pwm: True

#[led chamber_light]
#white_pin: PA3
#cycle_time: 0.001 # 0.003
#initial_WHITE: 0.1

[gcode_macro SET_CHAMBER_LIGHT]
# The variable below should be initialized to the startup value.  If your
# device is configured to be on at startup use "variable_value: 1"
variable_value: 1
gcode:
  {% if 'VALUE' not in params %}
    {action_raise_error("Parameter 'VALUE' missing from 'SET_CHAMBER_LIGHT'")}
  {% endif %}
  {% set state = params.VALUE|int %}
  {% if state %}
    # turn the LED on
    SET_PIN PIN=chamber_light VALUE=1.00 TRANSMIT=1
  {% else %}
    # turn the LED off
    SET_PIN PIN=chamber_light VALUE=0.00 TRANSMIT=1
  {% endif %}
  # Update the state of our variable.  This will inform Moonraker that
  # the device has changed its state.
  SET_GCODE_VARIABLE MACRO=SET_CHAMBER_LIGHT VARIABLE=value value={state}

[gcode_macro CHAMBER_LIGHT_ON]
gcode:
    SET_PIN PIN=chamber_light VALUE=1 TRANSMIT=1

[gcode_macro CHAMBER_LIGHT_IDLE]
gcode:
    SET_PIN PIN=chamber_light VALUE=0.06 TRANSMIT=1

[gcode_macro CHAMBER_LIGHT_PRINT]
gcode:
    SET_PIN PIN=chamber_light VALUE=0.4 TRANSMIT=1

[gcode_macro CHAMBER_LIGHT_OFF]
gcode:
    SET_PIN PIN=chamber_light VALUE=0 TRANSMIT=1

[gcode_macro _USER_START_PRINT_BEFORE_HOMING]
gcode:
    CHAMBER_LIGHT_PRINT

[gcode_macro _USER_END_PRINT_PARK]
gcode:
    CHAMBER_LIGHT_IDLE

#---------------------------------------------- Klipper-Backup ----------------------------------------------
# A Klipper-Backup Macro to manuel make a backup.
#------------------------------------------------------------------------------------------------------------
[gcode_macro update_git]
gcode:
    {% set message = params.MESSAGE|default() %}
    {% if message %}
        RUN_SHELL_COMMAND CMD=update_git_script_message PARAMS="'{params.MESSAGE}'"
    {% else %}
        RUN_SHELL_COMMAND CMD=update_git_script
    {% endif %}

[gcode_shell_command update_git_script]
command: bash -c "bash $HOME/klipper-backup/script.sh"
timeout: 90.0
verbose: True

[gcode_shell_command update_git_script_message]
command: bash -c "bash $HOME/klipper-backup/script.sh -c \"$0\""
timeout: 90.0
verbose: True

