#############################################################################################################
### CONFIGURATION GENERATED BY THE RATOS CONFIGURATOR
### Everything below [include RatOS.cfg] will override default RatOS behavior
#############################################################################################################
[include RatOS.cfg]

#############################################################################################################
### MACRO CONFIGURATION
### Configure the behavior of RatOS macros
### See: https://os.ratrig.com/docs/configuration/macros
#############################################################################################################
[gcode_macro RatOS]
variable_relative_extrusion: False
variable_preheat_extruder: False
variable_preheat_extruder_temp: 220
variable_calibrate_bed_mesh: True
variable_adaptive_mesh: False
variable_bed_mesh_profile: "default"
variable_nozzle_priming: "primeblob"
variable_start_print_park_in: "front"
variable_start_print_park_z_height: 50
variable_end_print_park_in: "back"
variable_end_print_park_z_hop: 10
variable_pause_print_park_in: "front"
variable_macro_travel_speed: 300
variable_macro_travel_accel: 3000
variable_macro_z_speed: 15
variable_filament_load_temp: 235        # temperature to heat up hotend for filament loading, default is 235
variable_filament_unload_temp: 185      # temperature to heat up hotend for filament un-loading, default is 185
variable_filament_load_min_temp: 190    # minimum hotend set temperature allowed in filament load macro, default is 190
variable_nozzle_purge_length: 200       # filament extrude amount during load sequenc, hotend purge from old filament, default is 200
variable_nozzle_purge_speed: 300        # filament extrude speed in mm/min adjust this value lower if flow is too high and extruder skips during loading, default is 300
variable_unload_distance: 65            # filament retract distance for unload procedure. this length shall be long enough to extract the filament above the drive gears
variable_park_retraction: 1             # edit your retraction amount for parking, default is 1

#############################################################################################################
### USER OVERRIDES & CUSTOM CONFIGURATION
### Anything custom you want to add, or RatOS configuration you want to override, do it here.
### This section is pre-populated with the most common settings you may want to change.
### See: https://os.ratrig.com/docs/configuration/includes-and-overrides
###
### It is recommended that you follow these steps to properly calibrate your printer:
### 0) Sanity check and PID Tuning: https://www.klipper3d.org/Config_checks.html
### 1) Z-offset calibration: https://www.klipper3d.org/Probe_Calibrate.html#calibrating-probe-z-offset
### 2) Pressure Advance: https://www.klipper3d.org/Pressure_Advance.html
### 3) Skew Correction: https://www.klipper3d.org/Skew_Correction.html
### 4) Resonance Compensation: https://www.klipper3d.org/Resonance_Compensation.html
### RatOS has dedicated macro's to generate shaper graphs for deeper analysis (requires accelerometer).
### Use MEASURE_COREXY_BELT_TENSION to compare tension between belts, and use
### GENERATE_SHAPER_GRAPHS to generate the resonance graphs for analysing and manually entering input shaper
### configuration.
### You can run SHAPER_CALIBRATE to automatically calibrate your input shaper configuration, if you just want
### to get started.
### Additionally, you can use the Realtime Analysis Tool to analyze your printer's performance in real-time.
### Read more about klipper here: https://www.klipper3d.org/Overview.html
#############################################################################################################

#-------------------------------------------------- RatOS ---------------------------------------------------
# RatOS
#------------------------------------------------------------------------------------------------------------
[ratos]
allow_unsupported_slicer_versions: True

#--------------------------------------------- exclude Objects ----------------------------------------------
# Enable object exclusion
#------------------------------------------------------------------------------------------------------------
[exclude_object]

#-------------------------------------------------- Arcs ----------------------------------------------------
# Enable arcs support
#------------------------------------------------------------------------------------------------------------
[gcode_arcs]
resolution: 0.1

#---------------------------------------------------- X -----------------------------------------------------
# The A motor in the CoreXY system, located at the rear left of the printer
#------------------------------------------------------------------------------------------------------------
[stepper_x]
dir_pin: x_dir_pin                 # Add ! in front of pin name to reverse the direction of stepper_x
rotation_distance: 40              # 40 for 20 tooth 2GT pulleys, 32 for 16 tooth 2GT pulleys
homing_speed: 50
position_min: 0
position_max: 300
position_endstop: 0

#---------------------------------------------------- Y -----------------------------------------------------
# The B motor in the CoreXY system, located at the rear right of the printer
#------------------------------------------------------------------------------------------------------------
[stepper_y]
dir_pin: y_dir_pin                 # Add ! in front of pin name to reverse the direction of stepper_y
rotation_distance: 40              # 40 for 20 tooth 2GT pulleys, 32 for 16 tooth 2GT pulleys
homing_speed: 50
position_min: 0
position_max: 300
position_endstop: 300

#---------------------------------------------------- Z -----------------------------------------------------
# The left Z motor for the kinematic bed
#------------------------------------------------------------------------------------------------------------
[stepper_z]
dir_pin: !z0_dir_pin               # Remove ! in front of pin name to reverse the direction of stepper_z
rotation_distance: 4               # 4 for TR8*4 lead screws
homing_speed: 10
position_min: -5
position_max: 310

#---------------------------------------------------- Z1 ----------------------------------------------------
# The rear Z motor for the kinematic bed
#------------------------------------------------------------------------------------------------------------
[stepper_z1]
dir_pin: !z1_dir_pin               # Remove ! in front of pin name to reverse the direction of stepper_z1
rotation_distance: 4               # 4 for TR8*4 lead screws

#---------------------------------------------------- Z2 ----------------------------------------------------
# The right Z motor for the kinematic bed
#------------------------------------------------------------------------------------------------------------
[stepper_z2]
dir_pin: !z2_dir_pin               # Remove ! in front of pin name to reverse the direction of stepper_z2
rotation_distance: 4               # 4 for TR8*4 lead screws

#------------------------------------------------- EXTRUDER -------------------------------------------------
# The extruder motor used for pushing filament through the toolhead
#------------------------------------------------------------------------------------------------------------
[extruder]
dir_pin: toolboard_t0:e_dir_pin    # Remove ! in front of pin name to reverse the direction of extruder
rotation_distance: 4.65778         # Orbiter 2 default
pressure_advance: 0.0575           # Check https://www.klipper3d.org/Pressure_Advance.html for pressure advance tuning.
#control: pid
#pid_kp: 28.413
#pid_ki: 1.334
#pid_kd: 151.300
sensor_type: MAX31865
sensor_pin: toolboard_t0:PA4       # CS-Pin
spi_software_sclk_pin: toolboard_t0:PA5 # SCLK-Pin
spi_software_miso_pin: toolboard_t0:PA6 # MISO-Pin
spi_software_mosi_pin: toolboard_t0:PA7 # MOSI-Pin
spi_speed: 4000000
rtd_nominal_r: 1000                # PT100 = 100 / PT1000 = 1000
rtd_reference_r: 4300              # Reference resistor PT100 = 430 / PT1000 = 4300
rtd_num_of_wires: 2                # 2-Wire or 4-Wire
rtd_use_50Hz_filter: True          # Optional
max_temp: 350

#--------------------------------------------- PART COOLING FAN ---------------------------------------------
# Part cooling fan on printhead with 4pin
#------------------------------------------------------------------------------------------------------------
[fan]
pin: !fan_part_cooling_pin
cycle_time: 0.00004
enable_pin: PB11
#tachometer_pin: ^mcu:PD14          # Made up pin name, look up your boards pinout diagram to get the pin name for the pin you've chosen
#tachometer_poll_interval: 0.0005   # will support up to a 30.000 RPM fan with 2 pulses per rotation.
kick_start_time: 0.100

#----------------------------------------------- INPUT SHAPER -----------------------------------------------
# Input shaper configuration from resonnance test
#------------------------------------------------------------------------------------------------------------
[input_shaper]
shaper_freq_x: 65.4                # Frequency found for X axis
shaper_type_x: ei                  # Recommended type (e.g., mzv, ei, 2hump_ei)
shaper_freq_y: 45.0                # Frequency found for Y axis
shaper_type_y: mzv                 # Recommended type (e.g., mzv, ei, 2hump_ei)
#shaper_freq_z: 45.0                # Frequency found for Z axis
#shaper_type_z: mzv                 # Recommended type (e.g., mzv, ei, 2hump_ei)

[printer]
max_accel: 6000                   # should not exceed the estimated max_accel for X and Y axes
#max_z_velocity: 20
#max_z_accel: 1550

[skew_correction]

#--------------------------------------------- FILAMENT SENSOR ----------------------------------------------
# Orbiter 2 Smart Filament Sensor
# Orbiter-smart-sensor connected to toolboard
#------------------------------------------------------------------------------------------------------------
[filament_switch_sensor toolhead_filament_sensor_t0]
pause_delay: 0.5

#-------------------------------------------------- PROBE ---------------------------------------------------
# Probe configuration
#------------------------------------------------------------------------------------------------------------
#[probe]
#z_offset: 0.0 # Will be commented out after a successful PROBE_CALIBRATE and SAVE_CONFIG
#pin: ^toolboard_t0:probe_pin # For NPN NC probes such as the Super Pinda / Vinda / SupCR / Decoprobe probes.
#pin: ^!toolboard_t0:probe_pin # NPN NO (refer to the specs of your probe)
#pin: toolboard_t0:probe_pin # PNP NO (refer to the specs of your probe)
#pin: !toolboard_t0:probe_pin # PNP NC (refer to the specs of your probe)

[mcu eddy]
#serial: /dev/serial/by-id/usb-Klipper_rp2040_eddy-if00
serial: /dev/serial/by-id/usb-Klipper_rp2040_50445061205F621C-if00
restart_method: command

#[probe_eddy_current btt_eddy]
[probe_eddy_ng btt_eddy]
#sensor_type: ldc1612
sensor_type: btt_eddy
#z_offset: 2.5
i2c_mcu: eddy                      # This value is good for the Eddy USB but would need to be adjusted for the Eddy Coil according to the MCU you have used.
i2c_bus: i2c0f                     # This value is good for the Eddy USB but would need to be adjusted for the Eddy Coil according to the I2C bus you have used. Measure the offsets below using the method described here: https://www.klipper3d.org/Probe_Calibrate.html#calibrating-probe-x-and-y-offsets
x_offset: -32.818
y_offset: -22.787
#tap_adjust_z: 0
tap_samples: 1

[gcode_macro EDDY_NG_TAP]
gcode:
    G0 X150 Y150 Z5
    PROBE_EDDY_NG_TAP

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu       # Sets the type of sensor for Klipper to read
sensor_mcu: eddy                   # Sets the MCU of the eddy probe tempereature sensor
min_temp: 10                       # Sets the minimum tempereature for eddys tempereature sensor to operate
max_temp: 100                      # Sets the maximum tempereature for eddys tempereature sensor to operate

[temperature_probe btt_eddy]       #btt_eddy
sensor_type: Generic 3950
sensor_pin: eddy:gpio26
#horizontal_move_z: 2

[save_variables]
filename: ~/printer_data/config/variables.cfg

[force_move]
enable_force_move: true            # Allows a user to move the z axis down if they have no other means of homing Z and need to calibrate the Eddy.

[safe_z_home]
home_xy_position: 150, 150         # Choose an X,Y position that is in the center of your bed. For a 300x300 machine that will be 150, 150. Use the same principle to calculate your bed center.
#z_hop: 10
z_hop_speed: 25
speed: 200

[z_tilt]
horizontal_move_z: 2.0

[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
gcode:
    SAVE_GCODE_STATE NAME=STATE_Z_TILT
    BED_MESH_CLEAR
    {% if not printer.z_tilt.applied %}
    _Z_TILT_ADJUST horizontal_move_z=8 retry_tolerance=1
    {% endif %}
    _Z_TILT_ADJUST horizontal_move_z=2
    RESTORE_GCODE_STATE NAME=STATE_Z_TILT
    G0 X150 Y150 Z5

[gcode_macro _USER_START_PRINT_AFTER_HEATING_EXTRUDER]
gcode:
	G0 X150 Y150 Z5
    G1 E-2 F600
    PROBE_EDDY_NG_TAP              # Implementation of Eddy_ng TAP on START_PRINT Macro

[gcode_macro _USER_END_PRINT_AFTER_HEATERS_OFF]
gcode:
	PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=0 # Clearing the TAP-Offset of Eddy_ng on END_PRINT Macro
    BED_MESH_CLEAR                 # Clearing the BED-MESH on END_PRINT Macro for Adaptiv Mesh

[bed_mesh]
horizontal_move_z: 2
speed: 200
mesh_min: 30, 30
mesh_max: 265, 275
probe_count: 11, 11
algorithm: bicubic
#scan_overshoot: 8                 # uncomment this section if you still have room left over on the X axis for some scan overshoot to product smoother movements
                                   # and more accurate scanning. Uncommenting this should be fine if you are using a standard voron mount.

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BTT_BED_MESH_CALIBRATE
gcode:
  BTT_BED_MESH_CALIBRATE METHOD=rapid_scan

